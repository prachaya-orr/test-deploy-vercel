<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คู่มือเกมปั่นหุ้น</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap');

    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-card: #1a2235;
      --accent-blue: #3b82f6;
      --accent-cyan: #22d3ee;
      --text-primary: #e8edf5;
      --text-secondary: #94a3b8;
      --gradient-blue: linear-gradient(135deg, #3b82f6, #8b5cf6);
      --gradient-green: linear-gradient(135deg, #10b981, #22d3ee);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'IBM Plex Sans Thai', 'Noto Sans Thai', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 60px;
    }

    .header h1 {
      font-size: 3.5rem;
      font-weight: 800;
      margin-bottom: 20px;
      background: var(--gradient-blue);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 1.2rem;
      color: var(--text-secondary);
    }

    .guides {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 40px;
    }

    .guide-card {
      background: var(--bg-card);
      border: 1px solid rgba(59, 130, 246, 0.1);
      border-radius: 16px;
      padding: 40px 30px;
      text-decoration: none;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .guide-card:hover {
      border-color: var(--accent-blue);
      box-shadow: var(--shadow-lg);
      transform: translateY(-5px);
    }

    .guide-card h2 {
      font-size: 1.8rem;
      margin-bottom: 15px;
      color: var(--text-primary);
    }

    .guide-card p {
      color: var(--text-secondary);
      margin-bottom: 30px;
      flex-grow: 1;
    }

    .guide-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 28px;
      background: var(--gradient-blue);
      color: white;
      border-radius: 8px;
      transition: all 0.3s ease;
      font-weight: 600;
      gap: 8px;
    }

    .guide-card:nth-child(2) .guide-button {
      background: var(--gradient-green);
    }

    .guide-button:hover {
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      .guides {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>คู่มือเกมปั่นหุ้น</h1>
      <p>รู้จักกับเกมแห่งการปั่นหุ้นและวิธีการเล่นให้ชาญฉลาด</p>
    </div>

    <div class="guides">
      <a href="/01-stock-manipulation-guide.html" class="guide-card">
        <div>
          <h2>📚 ตอนที่ 1</h2>
          <p>รู้จักเกมปั่นหุ้น — คู่มือฉบับสมบูรณ์</p>
          <p style="font-size: 0.9rem; color: var(--text-muted);">เรียนรู้พื้นฐานของเกมปั่นหุ้นและกลไกการหลอกลวง</p>
        </div>
        <button class="guide-button">
          <span>อ่านเลย →</span>
        </button>
      </a>

      <a href="/02-stock-signals-guide.html" class="guide-card">
        <div>
          <h2>📈 ตอนที่ 2</h2>
          <p>สัญญาณและรูปแบบการปั่นหุ้น</p>
          <p style="font-size: 0.9rem; color: var(--text-muted);">รู้จักเครื่องหมายเตือนและวิธีหลีกเลี่ยงการหลอกลวง</p>
        </div>
        <button class="guide-button">
          <span>อ่านเลย →</span>
        </button>
      </a>
    </div>
  </div>
</body>
</html>
